/* ---------------- helpers ---------------- */

function formatVND(n){
  const num = Math.round(Number(n)||0);
  const s = Math.abs(num).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
  return (num<0?"-":"") + s + "\u20AB";
}

function parseAmountInput(str){
  const digits = String(str).replace(/[^\d]/g,"");
  return digits ? parseInt(digits,10) : 0;
}

function todayKey(){
  const d = new Date();
  const p = n => String(n).padStart(2,"0");
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}

function monthKeyOf(dayKey){ return dayKey ? dayKey.slice(0,7) : ""; }

function monthLabel(monthKey){
  const [y,m] = monthKey.split("-").map(Number);
  const names = ["Tháng 1","Tháng 2","Tháng 3","Tháng 4","Tháng 5","Tháng 6","Tháng 7","Tháng 8","Tháng 9","Tháng 10","Tháng 11","Tháng 12"];
  return `${names[m-1]}, ${y}`;
}

function shiftMonthKey(monthKey, delta){
  let [y,m] = monthKey.split("-").map(Number);
  m += delta;
  while(m>12){ m-=12; y+=1; }
  while(m<1){ m+=12; y-=1; }
  return `${y}-${String(m).padStart(2,"0")}`;
}

function dateLabel(dayKey){
  const [y,m,d] = dayKey.split("-").map(Number);
  return `${String(d).padStart(2,"0")}/${String(m).padStart(2,"0")}`;
}

function genPin(){
  return String(Math.floor(100000 + Math.random()*900000));
}

function genId(prefix){
  return prefix + "_" + Date.now().toString(36) + Math.random().toString(36).slice(2,8);
}

function withTimeout(promise, ms, label){
  return Promise.race([
    promise,
    new Promise((_,rej)=> setTimeout(()=>rej(new Error((label||"request")+" timed out")), ms))
  ]);
}

/* ---------------- Firebase bootstrap screen ---------------- */

function ConfigScreen({ onSaved }){
  const [text, setText] = useState("");
  const [error, setError] = useState("");

  function save(){
    let cfg;
    try{ cfg = JSON.parse(text); }
    catch(e){
      try{
        // Strip comments, then find the {...} object by anchoring on "apiKey" and
        // walking brace depth to its match — robust to a full pasted snippet
        // (imports, const declarations, trailing initializeApp() calls, etc.).
        let cleaned = text
          .replace(/\/\*[\s\S]*?\*\//g, "")
          .replace(/^\s*\/\/.*$/gm, "");
        const anchor = cleaned.search(/apiKey/);
        if(anchor === -1) throw new Error("no apiKey found");
        const braceStart = cleaned.lastIndexOf("{", anchor);
        if(braceStart === -1) throw new Error("no opening brace");
        let depth = 0, braceEnd = -1;
        for(let i=braceStart; i<cleaned.length; i++){
          if(cleaned[i] === "{") depth++;
          else if(cleaned[i] === "}"){ depth--; if(depth===0){ braceEnd = i; break; } }
        }
        if(braceEnd === -1) throw new Error("no matching closing brace");
        const objText = cleaned.slice(braceStart, braceEnd+1);
        cfg = new Function("return (" + objText + ")")();
        if(typeof cfg !== "object" || cfg === null) throw new Error("not an object");
      }catch(e2){
        setError("Không đọc được cấu hình. Hãy dán đúng đối tượng firebaseConfig (từ Firebase console).");
        return;
      }
    }
    if(!cfg.apiKey || !cfg.databaseURL){
      setError("Thiếu apiKey hoặc databaseURL trong cấu hình.");
      return;
    }
    localStorage.setItem(LS_CONFIG, JSON.stringify(cfg));
    onSaved(cfg);
  }

  return h("div", { className:"min-h-screen flex items-center justify-center p-5", style:{background:"var(--navy)"} },
    h("div", { className:"paper rounded-2xl p-6 max-w-md w-full rise" },
      h("h1", { className:"font-display text-2xl font-semibold mb-1" }, "Kết nối Firebase"),
      h("p", { className:"text-sm mb-4", style:{color:"var(--ink-soft)"} },
        "Dán cấu hình Firebase (firebaseConfig) của dự án bạn dùng cho sổ chi tiêu. Thông tin này chỉ lưu trên máy này."),
      h("textarea", {
        className:"w-full h-40 p-3 rounded-lg border border-black/10 bg-white text-xs font-mono",
        placeholder: '{\n  "apiKey": "...",\n  "authDomain": "...",\n  "databaseURL": "https://xxx-default-rtdb.asia-southeast1.firebasedatabase.app",\n  "projectId": "..."\n}',
        value: text,
        onChange: e=>setText(e.target.value)
      }),
      error && h("p", { className:"text-sm mt-2", style:{color:"var(--oxblood)"} }, error),
      h("button", {
        className:"mt-4 w-full rounded-lg py-3 font-medium text-white",
        style:{background:"var(--oxblood)"},
        onClick: save
      }, "Lưu & tiếp tục")
    )
  );
}

/* ---------------- Family join/create screen ---------------- */

function FamilyGateScreen({ db, uid, onFamilyReady }){
  const [mode, setMode] = useState(null); // 'create' | 'join'
  const [pin, setPin] = useState("");
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState("");
  const [createdPin, setCreatedPin] = useState(null);
  const [familyId, setFamilyId] = useState(null);

  async function createFamily(){
    setBusy(true); setError("");
    try{
      const fid = genId("fam");
      const p = genPin();
      await withTimeout(set(ref(db, `families/${fid}/members/${uid}`), true), 6000, "tạo gia đình");
      await withTimeout(set(ref(db, `families/${fid}/categories`),
        DEFAULT_CATEGORIES.reduce((acc,name,i)=>{ acc[genId("cat")] = { name, order:i }; return acc; }, {})
      ), 6000, "tạo danh mục mặc định");
      await withTimeout(set(ref(db, `pins/${p}`), { familyId: fid }), 6000, "tạo mã PIN");
      setCreatedPin(p); setFamilyId(fid);
    }catch(e){
      setError("Không tạo được gia đình: " + e.message);
    }finally{ setBusy(false); }
  }

  async function joinFamily(){
    if(pin.trim().length < 4){ setError("Nhập mã PIN hợp lệ."); return; }
    setBusy(true); setError("");
    try{
      const snap = await withTimeout(get(ref(db, `pins/${pin.trim()}`)), 6000, "tra cứu mã PIN");
      if(!snap.exists()){ setError("Không tìm thấy mã PIN này, hoặc đã được dùng."); setBusy(false); return; }
      const fid = snap.val().familyId;
      await withTimeout(set(ref(db, `families/${fid}/members/${uid}`), true), 6000, "tham gia gia đình");
      await withTimeout(remove(ref(db, `pins/${pin.trim()}`)), 6000, "vô hiệu mã PIN");
      localStorage.setItem(LS_FAMILY, fid);
      onFamilyReady(fid);
    }catch(e){
      setError("Không tham gia được: " + e.message);
    }finally{ setBusy(false); }
  }

  function finishCreate(){
    localStorage.setItem(LS_FAMILY, familyId);
    onFamilyReady(familyId);
  }

  if(createdPin){
    return h("div", { className:"min-h-screen flex items-center justify-center p-5", style:{background:"var(--navy)"} },
      h("div", { className:"paper rounded-2xl p-6 max-w-md w-full text-center rise" },
        h("p", { className:"text-xs uppercase tracking-wide mb-2", style:{color:"var(--ink-soft)"} }, "Mã mời — dùng một lần"),
        h("div", { className:"font-mono text-4xl font-semibold tracking-widest mb-4", style:{color:"var(--oxblood)"} }, createdPin),
        h("p", { className:"text-sm mb-6", style:{color:"var(--ink-soft)"} },
          "Gửi mã này cho vợ/chồng bạn để họ tham gia sổ chi tiêu chung. Mã sẽ hết hạn ngay sau khi được dùng."),
        h("button", {
          className:"w-full rounded-lg py-3 font-medium text-white",
          style:{background:"var(--oxblood)"},
          onClick: finishCreate
        }, "Vào sổ chi tiêu")
      )
    );
  }

  if(mode === "join"){
    return h("div", { className:"min-h-screen flex items-center justify-center p-5", style:{background:"var(--navy)"} },
      h("div", { className:"paper rounded-2xl p-6 max-w-md w-full rise" },
        h("h1", { className:"font-display text-2xl font-semibold mb-1" }, "Tham gia gia đình"),
        h("p", { className:"text-sm mb-4", style:{color:"var(--ink-soft)"} }, "Nhập mã PIN được chia sẻ với bạn."),
        h("input", {
          className:"w-full p-3 rounded-lg border border-black/10 bg-white font-mono text-lg tracking-widest text-center",
          maxLength:6, inputMode:"numeric", placeholder:"000000",
          value: pin, onChange: e=>setPin(e.target.value.replace(/\D/g,""))
        }),
        error && h("p", { className:"text-sm mt-2", style:{color:"var(--oxblood)"} }, error),
        h("button", {
          className:"mt-4 w-full rounded-lg py-3 font-medium text-white disabled:opacity-50",
          style:{background:"var(--oxblood)"}, disabled: busy,
          onClick: joinFamily
        }, busy ? "Đang xử lý…" : "Tham gia"),
        h("button", { className:"mt-3 w-full text-sm", style:{color:"var(--ink-soft)"}, onClick: ()=>{setMode(null); setError("");} }, "Quay lại")
      )
    );
  }

  return h("div", { className:"min-h-screen flex items-center justify-center p-5", style:{background:"var(--navy)"} },
    h("div", { className:"paper rounded-2xl p-6 max-w-md w-full rise" },
      h("h1", { className:"font-display text-2xl font-semibold mb-1" }, "Sổ Chi Tiêu Gia Đình"),
      h("p", { className:"text-sm mb-6", style:{color:"var(--ink-soft)"} }, "Bắt đầu bằng cách tạo sổ mới, hoặc tham gia sổ đã có bằng mã PIN."),
      error && h("p", { className:"text-sm mb-3", style:{color:"var(--oxblood)"} }, error),
      h("button", {
        className:"w-full rounded-lg py-3 font-medium text-white mb-3 disabled:opacity-50",
        style:{background:"var(--oxblood)"}, disabled:busy,
        onClick: createFamily
      }, busy ? "Đang tạo…" : "Tạo sổ mới"),
      h("button", {
        className:"w-full rounded-lg py-3 font-medium border",
        style:{borderColor:"var(--ink-soft)"},
        onClick: ()=>setMode("join")
      }, "Tham gia bằng mã PIN")
    )
  );
}

/* ---------------- Entry form (add/edit) ---------------- */

function EntryForm({ categories, initial, onSubmit, onCancel }){
  const [item, setItem] = useState(initial?.item || "");
  const [categoryId, setCategoryId] = useState(initial?.categoryId || (categories[0]?.id || ""));
  const [amountStr, setAmountStr] = useState(initial ? String(initial.amount) : "");
  const [date, setDate] = useState(initial?.date || todayKey());
  const [error, setError] = useState("");

  function submit(e){
    e.preventDefault();
    const amount = parseAmountInput(amountStr);
    if(!item.trim()){ setError("Nhập tên khoản chi."); return; }
    if(!categoryId){ setError("Chọn danh mục."); return; }
    if(amount <= 0){ setError("Nhập số tiền hợp lệ."); return; }
    onSubmit({ item: item.trim(), categoryId, amount, date });
  }

  return h("form", { onSubmit: submit, className:"paper rounded-2xl p-4 rise" },
    h("div", { className:"grid grid-cols-1 gap-3" },
      h("div", null,
        h("label", { className:"text-xs uppercase tracking-wide", style:{color:"var(--ink-soft)"} }, "Khoản chi"),
        h("input", {
          className:"w-full mt-1 p-2.5 rounded-lg border border-black/10 bg-white",
          placeholder:"VD: Cà phê sáng, tiền điện tháng 7…",
          value:item, onChange:e=>setItem(e.target.value)
        })
      ),
      h("div", { className:"grid grid-cols-2 gap-3" },
        h("div", null,
          h("label", { className:"text-xs uppercase tracking-wide", style:{color:"var(--ink-soft)"} }, "Danh mục"),
          h("select", {
            className:"w-full mt-1 p-2.5 rounded-lg border border-black/10 bg-white",
            value:categoryId, onChange:e=>setCategoryId(e.target.value)
          }, categories.map(c=> h("option",{ key:c.id, value:c.id }, c.name)))
        ),
        h("div", null,
          h("label", { className:"text-xs uppercase tracking-wide", style:{color:"var(--ink-soft)"} }, "Ngày"),
          h("input", {
            type:"date", className:"w-full mt-1 p-2.5 rounded-lg border border-black/10 bg-white",
            value:date, onChange:e=>setDate(e.target.value)
          })
        )
      ),
      h("div", null,
        h("label", { className:"text-xs uppercase tracking-wide", style:{color:"var(--ink-soft)"} }, "Số tiền (₫)"),
        h("input", {
          className:"w-full mt-1 p-2.5 rounded-lg border border-black/10 bg-white font-mono text-lg",
          inputMode:"numeric", placeholder:"0",
          value: amountStr ? Number(parseAmountInput(amountStr)).toLocaleString("en-US") : "",
          onChange:e=>setAmountStr(e.target.value)
        })
      ),
      error && h("p", { className:"text-sm", style:{color:"var(--oxblood)"} }, error),
      h("div", { className:"flex gap-2 pt-1" },
        h("button", { type:"submit", className:"flex-1 rounded-lg py-2.5 font-medium text-white", style:{background:"var(--oxblood)"} }, initial ? "Lưu thay đổi" : "Thêm khoản chi"),
        onCancel && h("button", { type:"button", className:"px-4 rounded-lg py-2.5 font-medium border", style:{borderColor:"var(--ink-soft)"}, onClick:onCancel }, "Hủy")
      )
    )
  );
}

/* ---------------- Log tab (add + list) ---------------- */

function LogTab({ categories, entries, monthKey, onAdd, onUpdate, onDelete }){
  const [editing, setEditing] = useState(null);
  const catMap = useMemo(()=> Object.fromEntries(categories.map(c=>[c.id,c.name])), [categories]);

  const monthEntries = useMemo(()=>
    entries.filter(e=> monthKeyOf(e.date) === monthKey).sort((a,b)=> b.date.localeCompare(a.date) || (b.createdAt||0)-(a.createdAt||0))
  , [entries, monthKey]);

  const total = monthEntries.reduce((s,e)=> s+Number(e.amount||0), 0);

  return h("div", { className:"px-4 pb-24" },
    h("div", { className:"paper rounded-2xl p-4 mb-3 flex items-center justify-between" },
      h("span", { className:"text-sm", style:{color:"var(--ink-soft)"} }, "Tổng chi tháng này"),
      h("span", { className:"font-mono text-xl font-bold" }, formatVND(total))
    ),
    editing
      ? h(EntryForm, {
          categories, initial: editing === "new" ? null : editing,
          onSubmit: (vals)=>{
            if(editing === "new") onAdd(vals); else onUpdate(editing.id, vals);
            setEditing(null);
          },
          onCancel: ()=>setEditing(null)
        })
      : h("button", {
          className:"w-full rounded-2xl py-3.5 font-medium text-white mb-3 flex items-center justify-center gap-2",
          style:{background:"var(--oxblood)"},
          onClick: ()=>setEditing("new")
        }, "+ Thêm khoản chi"),
    h("div", { className:"paper rounded-2xl p-2" },
      monthEntries.length === 0
        ? h("p", { className:"text-center text-sm py-8", style:{color:"var(--ink-soft)"} }, "Chưa có khoản chi nào trong tháng này.")
        : monthEntries.map(e => h(EntryRow, {
            key:e.id, entry:e, categoryName: catMap[e.categoryId],
            onEdit: (ent)=>setEditing(ent),
            onDelete: (ent)=>{ if(confirm(`Xóa "${ent.item}"?`)) onDelete(ent.id); }
          }))
    )
  );
}

/* ---------------- Category drill-down tab ---------------- */

function CategoriesTab({ categories, entries, monthKey, onUpdate, onDelete }){
  const [openCat, setOpenCat] = useState(null);
  const [sortMode, setSortMode] = useState("date"); // 'date' | 'amount'
  const [editing, setEditing] = useState(null);

  const monthEntries = useMemo(()=> entries.filter(e=> monthKeyOf(e.date) === monthKey), [entries, monthKey]);

  const byCategory = useMemo(()=>{
    const map = {};
    for(const c of categories) map[c.id] = { name:c.name, total:0, items:[] };
    for(const e of monthEntries){
      if(!map[e.categoryId]) map[e.categoryId] = { name:"(đã xóa)", total:0, items:[] };
      map[e.categoryId].total += Number(e.amount||0);
      map[e.categoryId].items.push(e);
    }
    return map;
  }, [categories, monthEntries]);

  const rows = Object.entries(byCategory).sort((a,b)=> b[1].total - a[1].total);
  const grandTotal = rows.reduce((s,[,v])=>s+v.total,0);

  return h("div", { className:"px-4 pb-24" },
    rows.length === 0
      ? h("p", { className:"text-center text-sm py-8 text-white/70" }, "Chưa có dữ liệu tháng này.")
      : rows.map(([catId, data]) => {
          const isOpen = openCat === catId;
          const pct = grandTotal ? Math.round((data.total/grandTotal)*100) : 0;
          const items = [...data.items].sort((a,b)=> sortMode==="date"
            ? b.date.localeCompare(a.date)
            : Number(b.amount)-Number(a.amount));
          return h("div", { key:catId, className:"paper rounded-2xl p-4 mb-3" },
            h("button", { className:"w-full flex items-center justify-between text-left", onClick:()=>setOpenCat(isOpen?null:catId) },
              h("div", { className:"flex-1 min-w-0" },
                h("div", { className:"font-display text-lg font-medium truncate" }, data.name),
                h("div", { className:"h-1.5 rounded-full bg-black/10 mt-1.5 overflow-hidden" },
                  h("div", { className:"h-full rounded-full", style:{ width: pct+"%", background:"var(--brass)" } })
                ),
                h("div", { className:"text-xs mt-1", style:{color:"var(--ink-soft)"} }, `${data.items.length} khoản · ${pct}%`)
              ),
              h("div", { className:"flex items-center gap-2 ml-3" },
                h("span", { className:"font-mono font-semibold" }, formatVND(data.total)),
                h("span", { className: isOpen ? "rotate-90 transition-transform" : "transition-transform" }, h(IconChevron,{dir:"right"}))
              )
            ),
            isOpen && h("div", { className:"mt-3 pt-3 border-t border-black/10 rise" },
              h("div", { className:"flex items-center justify-end gap-1 mb-2" },
                h("span", { className:"text-xs mr-1", style:{color:"var(--ink-soft)"} }, "Sắp xếp:"),
                ["date","amount"].map(m => h("button", {
                  key:m,
                  className:"text-xs px-2.5 py-1 rounded-full font-medium",
                  style: sortMode===m ? {background:"var(--oxblood)", color:"white"} : {background:"var(--paper-2)", color:"var(--ink-soft)"},
                  onClick: ()=>setSortMode(m)
                }, m==="date" ? "Ngày" : "Số tiền"))
              ),
              editing && editing.categoryId === catId
                ? h(EntryForm, {
                    categories: Object.entries(byCategory).map(([id,d])=>({id,name:d.name})),
                    initial: editing,
                    onSubmit: (vals)=>{ onUpdate(editing.id, vals); setEditing(null); },
                    onCancel: ()=>setEditing(null)
                  })
                : items.map(e => h(EntryRow, {
                    key:e.id, entry:e, categoryName: data.name,
                    onEdit: (ent)=>setEditing(ent),
                    onDelete: (ent)=>{ if(confirm(`Xóa "${ent.item}"?`)) onDelete(ent.id); }
                  }))
            )
          );
        })
  );
}

/* ---------------- Manage categories tab ---------------- */

function ManageTab({ categories, onAdd, onRename, onDelete }){
  const [newName, setNewName] = useState("");
  const [renaming, setRenaming] = useState(null);
  const [renameVal, setRenameVal] = useState("");

  return h("div", { className:"px-4 pb-24" },
    h("div", { className:"paper rounded-2xl p-4 mb-3" },
      h("label", { className:"text-xs uppercase tracking-wide", style:{color:"var(--ink-soft)"} }, "Thêm danh mục mới"),
      h("div", { className:"flex gap-2 mt-1" },
        h("input", {
          className:"flex-1 p-2.5 rounded-lg border border-black/10 bg-white",
          placeholder:"VD: Du lịch", value:newName, onChange:e=>setNewName(e.target.value)
        }),
        h("button", {
          className:"px-4 rounded-lg font-medium text-white",
          style:{background:"var(--oxblood)"},
          onClick: ()=>{ if(newName.trim()){ onAdd(newName.trim()); setNewName(""); } }
        }, "Thêm")
      )
    ),
    h("div", { className:"paper rounded-2xl p-2" },
      categories.map(c => h("div", { key:c.id, className:"flex items-center gap-2 py-2.5 px-2 border-b border-black/10 last:border-0" },
        renaming === c.id
          ? h("input", {
              className:"flex-1 p-2 rounded-lg border border-black/10 bg-white",
              value:renameVal, onChange:e=>setRenameVal(e.target.value), autoFocus:true
            })
          : h("span", { className:"flex-1 font-medium" }, c.name),
        renaming === c.id
          ? h(React.Fragment, null,
              h("button", { className:"text-sm px-3 py-1.5 rounded-lg text-white", style:{background:"var(--green-ok)"}, onClick: ()=>{ if(renameVal.trim()) onRename(c.id, renameVal.trim()); setRenaming(null); } }, "Lưu"),
              h("button", { className:"text-sm px-3 py-1.5 rounded-lg border", style:{borderColor:"var(--ink-soft)"}, onClick: ()=>setRenaming(null) }, "Hủy")
            )
          : h(React.Fragment, null,
              h("button", { className:"p-1.5 rounded hover:bg-black/5", onClick: ()=>{ setRenaming(c.id); setRenameVal(c.name); } },
                h("svg",{width:16,height:16,viewBox:"0 0 24 24",fill:"none",stroke:"currentColor",strokeWidth:2}, h("path",{d:"M12 20h9"}), h("path",{d:"M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"}))
              ),
              h("button", { className:"p-1.5 rounded hover:bg-black/5", onClick: ()=>{ if(confirm(`Xóa danh mục "${c.name}"? Các khoản chi cũ vẫn giữ nguyên nhưng sẽ hiện "(đã xóa)".`)) onDelete(c.id); } },
                h("svg",{width:16,height:16,viewBox:"0 0 24 24",fill:"none",stroke:"var(--oxblood)",strokeWidth:2}, h("path",{d:"M3 6h18"}), h("path",{d:"M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"}), h("path",{d:"M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"}))
              )
            )
      ))
    )
  );
}

/* ---------------- Family tab ---------------- */

function FamilyTab({ db, familyId, uid, members }){
  const [pin, setPin] = useState(null);
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState("");

  async function generateInvite(){
    setBusy(true); setError("");
    try{
      const p = genPin();
      await withTimeout(set(ref(db, `pins/${p}`), { familyId }), 6000, "tạo mã mời");
      setPin(p);
    }catch(e){ setError("Không tạo được mã: "+e.message); }
    finally{ setBusy(false); }
  }

  async function revoke(memberUid){
    if(memberUid === uid){ alert("Bạn không thể tự xóa chính mình khỏi sổ."); return; }
    if(!confirm("Thu hồi quyền truy cập của thành viên này?")) return;
    try{
      await withTimeout(remove(ref(db, `families/${familyId}/members/${memberUid}`)), 6000, "thu hồi quyền");
    }catch(e){ alert("Lỗi: "+e.message); }
  }

  return h("div", { className:"px-4 pb-24" },
    h("div", { className:"paper rounded-2xl p-4 mb-3" },
      h("h2", { className:"font-display text-lg font-medium mb-1" }, "Mời thành viên"),
      h("p", { className:"text-sm mb-3", style:{color:"var(--ink-soft)"} }, "Tạo mã PIN dùng một lần để mời vợ/chồng tham gia sổ chi tiêu chung."),
      pin
        ? h("div", { className:"text-center" },
            h("div", { className:"font-mono text-3xl font-semibold tracking-widest mb-2", style:{color:"var(--oxblood)"} }, pin),
            h("p", { className:"text-xs", style:{color:"var(--ink-soft)"} }, "Mã sẽ hết hạn ngay khi được dùng.")
          )
        : h("button", {
            className:"w-full rounded-lg py-2.5 font-medium text-white disabled:opacity-50",
            style:{background:"var(--oxblood)"}, disabled:busy, onClick:generateInvite
          }, busy ? "Đang tạo…" : "Tạo mã mời"),
      error && h("p", { className:"text-sm mt-2", style:{color:"var(--oxblood)"} }, error)
    ),
    h("div", { className:"paper rounded-2xl p-4" },
      h("h2", { className:"font-display text-lg font-medium mb-2" }, "Thành viên"),
      Object.keys(members).length === 0
        ? h("p", { className:"text-sm", style:{color:"var(--ink-soft)"} }, "Chưa có dữ liệu.")
        : Object.keys(members).map(m => h("div", { key:m, className:"flex items-center justify-between py-2 border-b border-black/10 last:border-0" },
            h("span", { className:"font-mono text-xs truncate" }, m === uid ? "Thiết bị này" : m.slice(0,12)+"…"),
            m !== uid && h("button", { className:"text-xs px-2.5 py-1 rounded-full font-medium", style:{background:"var(--paper-2)", color:"var(--oxblood)"}, onClick:()=>revoke(m) }, "Thu hồi")
          ))
    )
  );
}

/* ---------------- Main app shell ---------------- */

const TABS = [
  { key:"log", label:"Ghi chép" },
  { key:"categories", label:"Danh mục" },
  { key:"manage", label:"Quản lý" },
  { key:"family", label:"Gia đình" },
];

function MainApp({ db, familyId, uid }){
  const [tab, setTab] = useState("log");
  const [monthKey, setMonthKey] = useState(monthKeyOf(todayKey()));
  const [categories, setCategories] = useState([]);
  const [entries, setEntries] = useState([]);
  const [members, setMembers] = useState({});
  const [loaded, setLoaded] = useState(false);

  useEffect(()=>{
    const catRef = ref(db, `families/${familyId}/categories`);
    const unsubCat = onValue(catRef, snap => {
      const val = snap.val() || {};
      const list = Object.entries(val).map(([id,v])=>({ id, name:v.name, order:v.order||0 }));
      list.sort((a,b)=> a.order-b.order);
      setCategories(list);
    });
    const expRef = ref(db, `families/${familyId}/expenses`);
    const unsubExp = onValue(expRef, snap => {
      const val = snap.val() || {};
      setEntries(Object.entries(val).map(([id,v])=>({ id, ...v })));
      setLoaded(true);
    });
    const memRef = ref(db, `families/${familyId}/members`);
    const unsubMem = onValue(memRef, snap => setMembers(snap.val() || {}));
    return ()=>{ unsubCat(); unsubExp(); unsubMem(); };
  }, [db, familyId]);

  const addEntry = useCallback((vals)=>{
    const id = genId("exp");
    set(ref(db, `families/${familyId}/expenses/${id}`), { ...vals, createdAt: Date.now() }).catch(e=>alert("Lỗi lưu: "+e.message));
  }, [db, familyId]);

  const updateEntry = useCallback((id, vals)=>{
    update(ref(db, `families/${familyId}/expenses/${id}`), { ...vals, updatedAt: Date.now() }).catch(e=>alert("Lỗi cập nhật: "+e.message));
  }, [db, familyId]);

  const deleteEntry = useCallback((id)=>{
    remove(ref(db, `families/${familyId}/expenses/${id}`)).catch(e=>alert("Lỗi xóa: "+e.message));
  }, [db, familyId]);

  const addCategory = useCallback((name)=>{
    const id = genId("cat");
    const order = categories.length;
    set(ref(db, `families/${familyId}/categories/${id}`), { name, order }).catch(e=>alert("Lỗi: "+e.message));
  }, [db, familyId, categories]);

  const renameCategory = useCallback((id, name)=>{
    update(ref(db, `families/${familyId}/categories/${id}`), { name }).catch(e=>alert("Lỗi: "+e.message));
  }, [db, familyId]);

  const deleteCategory = useCallback((id)=>{
    remove(ref(db, `families/${familyId}/categories/${id}`)).catch(e=>alert("Lỗi: "+e.message));
  }, [db, familyId]);

  return h("div", { className:"min-h-screen", style:{background:"var(--navy)"} },
    h("div", { className:"sticky top-0 z-10", style:{background:"var(--navy)"} },
      h("div", { className:"text-center pt-4" },
        h("h1", { className:"font-display text-white/95 text-xl tracking-wide" }, "Sổ Chi Tiêu Gia Đình")
      ),
      h(MonthNav, { monthKey, onChange:setMonthKey })
    ),
    h("div", { className:"pt-2" },
      tab==="log" && h(LogTab, { categories, entries, monthKey, onAdd:addEntry, onUpdate:updateEntry, onDelete:deleteEntry }),
      tab==="categories" && h(CategoriesTab, { categories, entries, monthKey, onUpdate:updateEntry, onDelete:deleteEntry }),
      tab==="manage" && h(ManageTab, { categories, onAdd:addCategory, onRename:renameCategory, onDelete:deleteCategory }),
      tab==="family" && h(FamilyTab, { db, familyId, uid, members })
    ),
    h("div", { className:"fixed bottom-0 left-0 right-0 flex justify-around py-2 border-t", style:{background:"var(--navy-2)", borderColor:"rgba(255,255,255,0.08)"} },
      TABS.map(t => h("button", {
        key:t.key,
        className:"tabbtn flex flex-col items-center gap-0.5 px-3 py-1 text-xs font-medium " + (tab===t.key ? "active" : "text-white/60"),
        onClick: ()=>setTab(t.key)
      }, h("span", { className:"w-1.5 h-1.5 rounded-full mb-0.5", style:{ background: tab===t.key ? "var(--oxblood)" : "transparent" } }), t.label))
    )
  );
}

/* ---------------- Root ---------------- */

function Root(){
  const [config, setConfig] = useState(()=>{
    if(BAKED_CONFIG) return BAKED_CONFIG;
    const raw = localStorage.getItem(LS_CONFIG);
    return raw ? JSON.parse(raw) : null;
  });
  const [db, setDb] = useState(null);
  const [uid, setUid] = useState(null);
  const [familyId, setFamilyId] = useState(()=> localStorage.getItem(LS_FAMILY));
  const [authError, setAuthError] = useState("");

  useEffect(()=>{
    if(!config) return;
    try{
      const app = initializeApp(config);
      const auth = getAuth(app);
      const database = getDatabase(app);
      setDb(database);
      onAuthStateChanged(auth, user => {
        if(user) setUid(user.uid);
        else signInAnonymously(auth).catch(e=> setAuthError("Không đăng nhập được: "+e.message));
      });
    }catch(e){
      setAuthError("Cấu hình Firebase không hợp lệ: "+e.message);
    }
  }, [config]);

  if(!config) return h(ConfigScreen, { onSaved: setConfig });
  if(authError) return h("div", { className:"min-h-screen flex items-center justify-center p-6 text-white text-center", style:{background:"var(--navy)"} }, authError);
  if(!db || !uid) return h("div", { className:"min-h-screen flex items-center justify-center text-white/70", style:{background:"var(--navy)"} }, "Đang kết nối…");
  if(!familyId) return h(FamilyGateScreen, { db, uid, onFamilyReady: setFamilyId });

  return h(MainApp, { db, familyId, uid });
}

createRoot(document.getElementById("root")).render(h(Root));
</script>
